name: Build Kodu Game Lab

on:
  push:
    branches: [ monogame ]
  pull_request:
    branches: [ monogame ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Setup Wine
      uses: monogame/monogame-actions/install-wine@v1
    
    - name: Setup MS Fonts
      uses: monogame/monogame-actions/install-fonts@v1

    - name: Restore dependencies
      run: dotnet restore main/Content/Builder.csproj
        
    - name: Restore dependencies
      run: dotnet restore main/Boku/boku.csproj
      
    - name: Build
      run: dotnet build main/Boku/boku.csproj --no-restore --configuration Release
